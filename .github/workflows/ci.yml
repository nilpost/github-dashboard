name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # package-lock.json is gitignored, so `npm ci` (which requires a
      # committed lockfile) cannot be used here — install from package.json.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build
